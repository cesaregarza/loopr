name: CI

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - "v*"

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Run test suite
        run: uv run pytest -q

  package-smoke:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Run Docker test target
        uses: docker/build-push-action@v6
        with:
          context: .
          target: test
          load: false
          push: false

      - name: Build source and wheel distributions from Dockerfile
        uses: docker/build-push-action@v6
        with:
          context: .
          target: artifacts
          outputs: type=local,dest=dist

      - name: Verify built artifacts exist
        run: |
          ls -l dist
          test -n "$(find dist -maxdepth 1 -type f \( -name '*.whl' -o -name '*.tar.gz' \))"

      - name: Install packaging checks
        run: python -m pip install --upgrade pip twine

      - name: Validate package metadata
        run: python -m twine check dist/*

      - name: Smoke test built wheel
        run: |
          python -m pip install --force-reinstall dist/*.whl
          loopr --version
          loopr rank \
            --matches examples/quickstart/matches.csv \
            --participants examples/quickstart/participants.csv \
            --appearances examples/quickstart/appearances.csv \
            --output /tmp/rankings.csv
          test -s /tmp/rankings.csv
